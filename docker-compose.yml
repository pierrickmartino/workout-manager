services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workout
    ports:
      # Host port is overridable (e.g. DB_PORT=5433) to avoid clashing with a
      # Postgres already running on the host; the container port stays 5432.
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # Override REDIS_PORT if 6379 is already taken on the host.
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./apps/api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/workout
      REDIS_URL: redis://redis:6379/0
      CLERK_ISSUER: ${CLERK_ISSUER}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
      # AI generation provider selection (ADR-0006). Only the selected
      # provider's key is required; others may be blank.
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
    ports:
      - "${API_PORT:-8000}:8000"

  worker:
    # Runs Program generation off the API request path (ADR-0005). Reuses the API
    # image but starts an RQ worker against the same Redis that backs the cache.
    build: ./apps/api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/workout
      REDIS_URL: redis://redis:6379/0
      # The worker constructs its own LLM transport via the same factory, so it
      # needs the same provider selection + keys as the api service (ADR-0006).
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
    command: ["sh", "-c", "rq worker --url \"$REDIS_URL\" generation"]

  web:
    build:
      context: ./apps/web
      args:
        # Public Clerk key must be baked into the client bundle at build time;
        # the secret key stays runtime-only (see environment below).
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      API_URL: http://api:8000
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
